---
- name: Kubernetes | Fail if etcd deployment type is not "internal" or "external"
  run_once: true
  assert:
    that: .cluster_require.require_etcd_deployment_type | has .etcd.deployment_type
    fail_msg: >-
      Invalid etcd deployment type: "{{ .etcd.deployment_type }}". Expected "internal" or "external".

- name: ETCD | Ensure target etcd version is not lower than installed version
  when:
    - .upgrade.etcd
    - .etcd_install_version.error | empty
  assert:
    that: .etcd.etcd_version | semverCompare (printf ">=v%s" (index .etcd_install_version "stdout" "etcd Version"))
    fail_msg: >-
      Installed etcd version: {{ index .etcd_install_version "stdout" "etcd Version" }} is lower than target etcd version: {{ .etcd.etcd_version }}

- name: ETCD | Validate etcd version is sufficient for target Kubernetes version
  run_once: true
  block:
    - name: ETCD | Determine the effective etcd version to validate
      run_once: true
      set_fact:
        upgrade_etcd_version: >-
          {{- if .upgrade.etcd -}} {{ .etcd.etcd_version }} {{- else -}} {{ index .etcd_install_version "stdout" "etcd Version" | default "" }} {{- end -}}
    - name: ETCD | Verify etcd minimum version for exact Kubernetes release
      when: 
        - .upgrade_etcd_version | empty | not 
        - hasKey .cluster_require.etcd_min_versions .kubernetes.kube_version
      assert:
        that: .upgrade_etcd_version | semverCompare (printf ">=%s" (index .cluster_require.etcd_min_versions .kubernetes.kube_version))
        fail_msg: >-
          The etcd version ({{ .upgrade_etcd_version }}) is too old. For Kubernetes {{ .kubernetes.kube_version }}, the minimum required etcd version is {{ index .cluster_require.etcd_min_versions .kubernetes.kube_version }}. {{ if .upgrade.etcd | not }}Set --all or --set upgrade.etcd=true to upgrade etcd.{{ end }}
    - name: ETCD | Verify etcd minimum version for Kubernetes minor release
      when:
        - .upgrade_etcd_version | empty | not 
        - hasKey .cluster_require.etcd_min_versions .kubernetes.kube_version | not
        - hasKey .cluster_require.etcd_min_versions (slice (.kubernetes.kube_version | splitList ".") 0 2 | join ".")
      assert:
        that: .upgrade_etcd_version | semverCompare (printf ">=%s" (index .cluster_require.etcd_min_versions (slice (.kubernetes.kube_version | splitList ".") 0 2 | join ".")))
        fail_msg: >-
          The etcd version ({{ .upgrade_etcd_version }}) is too old. For Kubernetes {{ .kubernetes.kube_version }}, the minimum required etcd version is {{ index .cluster_require.etcd_min_versions (slice (.kubernetes.kube_version | splitList ".") 0 2 | join ".") }}. {{ if .upgrade.etcd | not }}Set --all or --set upgrade.etcd=true to upgrade etcd.{{ end }}

## https://cwiki.yunify.com/pages/viewpage.action?pageId=145920824
- name: ETCD | Validate disk I/O performance for etcd
  when:
    - .groups.etcd | default list | has .inventory_hostname
  block:
    - name: ETCD | Check if fio is installed
      ignore_errors: true
      command: fio --version
      register: fio_install_version
    - name: ETCD | Run fio disk I/O test
      when: .fio_install_version.error | empty
      block:
        - name: ETCD | Execute fio and collect results
          command: |
            mkdir -p {{ .tmp_dir }}/etcd/test-data
            fio --rw=write --ioengine=sync --fdatasync=1 --directory={{ .tmp_dir }}/etcd/test-data --size=22m --bs=2300 --name=mytest --output-format=json
          register: fio_result
          register_type: json
        - name: ETCD | Assert disk fsync latency meets requirements
          assert:
            that: (index (.fio_result.stdout.jobs | first) "sync" "lat_ns" "percentile" "90.000000") | int | ge (int .cluster_require.etcd_disk_wal_fysnc_duration_seconds)
            fail_msg: >-
              The 90th percentile fsync latency is {{ index (.fio_result.stdout.jobs | first) "sync" "lat_ns" "percentile" "90.000000" }}ns, which exceeds the maximum allowed: {{ .cluster_require.etcd_disk_wal_fysnc_duration_seconds }}ns.
      always:
        - name: ETCD | Clean up fio test data directory
          command: rm -rf {{ .tmp_dir }}/etcd/test-data

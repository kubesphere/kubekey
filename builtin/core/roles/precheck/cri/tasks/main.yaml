---
- name: CRI | Fail if container manager is not docker or containerd
  assert:
    that: .cluster_require.require_container_manager | has .cri.container_manager
    fail_msg: >-
      The specified container manager "{{ .cri.container_manager }}" is not supported. Please use one of the following: {{ .cluster_require.require_container_manager | toJson }}.

- name: CRI | Validate target containerd version when upgrading cri
  when:
    - .cri.containerd_version | empty | not
    - .cri.container_manager | eq "containerd"
    - .upgrade.cri
  assert:
    that: .cri.containerd_version | semverCompare (printf ">=%s" .cluster_require.containerd_min_version_required)
    fail_msg: >-
      The specified containerd version ({{ .cri.containerd_version }}) is below the minimum required version: {{ .cluster_require.containerd_min_version_required }}.

- name: CRI | Validate installed containerd version when not upgrading cri
  when:
    - .cri.container_manager | eq "containerd"
    - .upgrade.cri | not
    - .upgrade | default dict | empty | not
    - .containerd_current_version.stdout | empty | not
  assert:
    that: .containerd_current_version.stdout | semverCompare (printf ">=%s" .cluster_require.containerd_min_version_required)
    fail_msg: >-
      The installed containerd version ({{ .containerd_current_version.stdout }}) is below the minimum required version ({{ .cluster_require.containerd_min_version_required }}) for Kubernetes {{ .kubernetes.kube_version }}. Set --all or --set upgrade.cri=true to upgrade containerd.

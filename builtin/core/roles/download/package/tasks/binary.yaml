---
- name: Binary | Ensure etcd binary is present
  loop: >
    {{- $result := list -}}
    {{- range $arch := .download.arch }}
      {{- range $version := $.download.etcd.etcd_version }}
        {{- $result = append $result (dict "arch" $arch "version" $version) -}}
      {{- end }}
    {{- end }}
    {{- $result | toJson }}
  when: 
    - .download.etcd.etcd_version | empty | not
    - printf "%s/etcd/%s/%s/etcd-%s-linux-%s.tar.gz" .artifact_dir .item.version .item.arch .item.version .item.arch | fileExists | not
  copy:
    src: "{{ .binary_dir }}/etcd/{{ .item.version }}/{{ .item.arch }}/etcd-{{ .item.version }}-linux-{{ .item.arch }}.tar.gz"
    dest: "{{ .artifact_dir }}/etcd/{{ .item.version }}/{{ .item.arch }}/etcd-{{ .item.version }}-linux-{{ .item.arch }}.tar.gz"


- name: Image | Download container images
  when:
    - .download.images.manifests | default list | empty | not
    - .download.images.fetch
  image:
    pull:
      platform: >-
        {{ .download.images.arch }}
      auths: "{{ .cri.registry.auths | toJson }}"
      images_dir: >-
        {{ .binary_dir }}/images/
      manifests: "{{ .download.images.manifests | toJson }}"

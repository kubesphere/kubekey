download:
  # if set as "cn", so that online downloads will try to use available domestic sources whenever possible.
  zone: ""
  # default cn zone file storage host
  cn_host: kubekey.pek3b.qingstor.com
  arch: [ "amd64" ]
  # offline artifact package for kk.
  artifact_file: ""
  # the md5_file of artifact_file.
  artifact_md5: ""
  # system: specify operating system type to download ISO packages only for the specified system.
  # Supported values:
  #   - Operating system level: "AlmaLinux", "CentOS", "Debian", "Kylin", "Ubuntu" (downloads all versions)
  #   - Specific version: "almalinux-9.0", "centos-8", "debian-10", "debian-11", "kylin-v10SP1", "kylin-v10SP2", "kylin-v10SP3", "kylin-v10SP3-2403", "ubuntu-18.04", "ubuntu-20.04", "ubuntu-22.04", "ubuntu-24.04" (downloads only the specified version)
  # If not set or empty, all ISO packages will be downloaded.
  system: ""
  artifact_url:
    etcd:
      amd64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/etcd-io/etcd/releases/download/{{ .etcd.etcd_version }}/etcd-{{ .etcd.etcd_version }}-linux-amd64.tar.gz
      arm64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/etcd-io/etcd/releases/download/{{ .etcd.etcd_version }}/etcd-{{ .etcd.etcd_version }}-linux-arm64.tar.gz
    kubeadm:
      amd64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        dl.k8s.io/release/{{ .kubernetes.kube_version }}/bin/linux/amd64/kubeadm
      arm64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        dl.k8s.io/release/{{ .kubernetes.kube_version }}/bin/linux/arm64/kubeadm
    kubelet:
      amd64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        dl.k8s.io/release/{{ .kubernetes.kube_version }}/bin/linux/amd64/kubelet
      arm64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        dl.k8s.io/release/{{ .kubernetes.kube_version }}/bin/linux/arm64/kubelet
    kubectl:
      amd64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        dl.k8s.io/release/{{ .kubernetes.kube_version }}/bin/linux/amd64/kubectl
      arm64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        dl.k8s.io/release/{{ .kubernetes.kube_version }}/bin/linux/arm64/kubectl
    cni_plugins:
      amd64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/containernetworking/plugins/releases/download/{{ .cni.cni_plugins_version }}/cni-plugins-linux-amd64-{{ .cni.cni_plugins_version }}.tgz
      arm64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/containernetworking/plugins/releases/download/{{ .cni.cni_plugins_version }}/cni-plugins-linux-arm64-{{ .cni.cni_plugins_version }}.tgz
    helm:
      amd64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        get.helm.sh/helm-{{ .kubernetes.helm_version }}-linux-amd64.tar.gz
      arm64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        get.helm.sh/helm-{{ .kubernetes.helm_version }}-linux-arm64.tar.gz
    crictl:
      amd64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/kubernetes-sigs/cri-tools/releases/download/{{ .cri.crictl_version }}/crictl-{{ .cri.crictl_version }}-linux-amd64.tar.gz
      arm64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/kubernetes-sigs/cri-tools/releases/download/{{ .cri.crictl_version }}/crictl-{{ .cri.crictl_version }}-linux-arm64.tar.gz
    docker:
      amd64: >-
        {{- .download.zone | eq "cn" | ternary "https://mirrors.aliyun.com/docker-ce/" "https://download.docker.com/" -}}
        linux/static/stable/x86_64/docker-{{ .cri.docker_version }}.tgz
      arm64: >-
        {{- .download.zone | eq "cn" | ternary "https://mirrors.aliyun.com/docker-ce/" "https://download.docker.com/" -}}
        linux/static/stable/aarch64/docker-{{ .cri.docker_version }}.tgz
    cridockerd:
      amd64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/Mirantis/cri-dockerd/releases/download/{{ .cri.cridockerd_version }}/cri-dockerd-{{ .cri.cridockerd_version | default "" | trimPrefix "v" }}.amd64.tgz
      arm64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/Mirantis/cri-dockerd/releases/download/{{ .cri.cridockerd_version }}/cri-dockerd-{{ .cri.cridockerd_version | default "" | trimPrefix "v" }}.arm64.tgz
    containerd:
      amd64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/containerd/containerd/releases/download/{{ .cri.containerd_version }}/containerd-{{ .cri.containerd_version | default "" | trimPrefix "v" }}-linux-amd64.tar.gz
      arm64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/containerd/containerd/releases/download/{{ .cri.containerd_version }}/containerd-{{ .cri.containerd_version | default "" | trimPrefix "v"  }}-linux-arm64.tar.gz
    runc:
      amd64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/opencontainers/runc/releases/download/{{ .cri.runc_version }}/runc.amd64
      arm64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/opencontainers/runc/releases/download/{{ .cri.runc_version }}/runc.arm64
    dockercompose:
      amd64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/docker/compose/releases/download/{{ .image_registry.dockercompose_version }}/docker-compose-linux-x86_64
      arm64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/docker/compose/releases/download/{{ .image_registry.dockercompose_version }}/docker-compose-linux-aarch64
    docker_registry:
      amd64: >-
        https://{{ .download.cn_host }}/docker.io/registry/{{ .image_registry.docker_registry_version }}/docker-registry-{{ .image_registry.docker_registry_version }}-linux-amd64.tgz
      arm64: >-
        https://{{ .download.cn_host }}/docker.io/registry/{{ .image_registry.docker_registry_version }}/docker-registry-{{ .image_registry.docker_registry_version }}-linux-arm64.tgz
    harbor:
      amd64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/goharbor/harbor/releases/download/{{ .image_registry.harbor_version }}/harbor-offline-installer-{{ .image_registry.harbor_version }}.tgz
      arm64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/kubesphere/kubekey/releases/download/iso-latest/harbor-offline-installer-{{ .image_registry.harbor_version }}.tgz
#    keepalived:
#      amd64: >-
#        {{- if .download.zone | eq "cn" -}}
#        https://kubernetes-release.pek3b.qingstor.com/osixia/keepalived/releases/download/{{ .image_registry.keepalived_version }}/keepalived-{{ .image_registry.keepalived_version }}-linux-amd64.tgz
#        {{- else -}}
#        https://github.com/osixia/keepalived/releases/download/{{ .image_registry.keepalived_version }}/keepalived-{{ .image_registry.keepalived_version }}-linux-amd64.tgz
#        {{- end -}}
#      arm64: >-
#        {{- if .download.zone | eq "cn" -}}
#        https://kubernetes-release.pek3b.qingstor.com/osixia/keepalived/releases/download/{{ .image_registry.keepalived_version }}/keepalived-{{ .image_registry.keepalived_version }}-linux-arm64.tgz
#        {{- else -}}
#        https://github.com/osixia/keepalived/releases/download/{{ .image_registry.keepalived_version }}/keepalived-{{ .image_registry.keepalived_version }}-linux-arm64.tgz
#        {{- end -}}
    # Notice: In the early calico helm chart, appVersion is not same as version(eg. v3.17.4)
    calico: https://github.com/projectcalico/calico/releases/download/{{ .cni.calico_version }}/tigera-operator-{{ .cni.calico_version }}.tgz
    calicoctl:
      amd64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/projectcalico/calico/releases/download/{{ .cni.calico_version }}/calicoctl-linux-amd64
      arm64: >-
        {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
        github.com/projectcalico/calico/releases/download/{{ .cni.calico_version }}/calicoctl-linux-arm64
    flannel: https://github.com/flannel-io/flannel/releases/download/{{ .cni.flannel_version }}/flannel.tgz
    cilium: >-
      {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
      helm.cilium.io/cilium-{{ .cni.cilium_version }}.tgz
    kubeovn: >-
      {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
      kubeovn.github.io/kube-ovn/kube-ovn-{{ .cni.kubeovn_version }}.tgz
    hybridnet: >-
      {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
      github.com/alibaba/hybridnet/releases/download/helm-chart-{{ .cni.hybridnet_version }}/hybridnet-{{ .cni.hybridnet_version }}.tgz
    localpv_provisioner: >-
      {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
      openebs.github.io/dynamic-localpv-provisioner/localpv-provisioner-{{ .storage_class.localpv_provisioner_version }}.tgz
    nfs_provisioner: >-
      {{- .download.zone | eq "cn" | ternary (tpl "https://{{ .download.cn_host }}/" .) "https://" -}}
      github.com/kubernetes-sigs/nfs-subdir-external-provisioner/releases/download/nfs-subdir-external-provisioner-4.0.18/nfs-subdir-external-provisioner-{{ .storage_class.nfs_provisioner_version }}.tgz
  download_image: false
  download_iso: false
  iso_url:
    base_path: >-
      {{- if .download.zone | eq "cn" -}}
      https://{{ .download.cn_host }}
      {{- else -}}
      https://github.com
      {{- end -}}
    urls:
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/almalinux-9.0-rpms-amd64.iso"
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/almalinux-9.0-rpms-arm64.iso"
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/centos-8-rpms-amd64.iso"
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/centos-8-rpms-arm64.iso"
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/debian-10-debs-amd64.iso"
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/debian-10-debs-arm64.iso"
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/debian-11-debs-amd64.iso"
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/debian-11-debs-arm64.iso"
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/kylin-v10SP3-2403-rpms-amd64.iso"
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/kylin-v10SP3-2403-rpms-arm64.iso"
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/kylin-v10SP3-rpms-amd64.iso"
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/kylin-v10SP3-rpms-arm64.iso"
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/kylin-v10SP2-rpms-amd64.iso"
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/kylin-v10SP2-rpms-arm64.iso"
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/kylin-v10SP1-rpms-amd64.iso"
      - "{{ .download.iso_url.base_path }}/kubesphere/kubekey/releases/download/iso-latest/kylin-v10SP1-rpms-arm64.iso"

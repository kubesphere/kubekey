        {{- end -}}
      arm64: >-
        {{- if .download.zone | eq "cn" -}}
        https://{{ .download.cn_host }}/github.com/kubernetes-sigs/cri-tools/releases/download/{{ .cri.crictl_version }}/crictl-{{ .cri.crictl_version }}-linux-arm64.tar.gz
        {{- else -}}

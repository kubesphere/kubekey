        {{- end -}}
    helm:
      amd64: >-
        {{- if .download.zone | eq "cn" -}}
        https://{{ .download.cn_host }}/get.helm.sh/helm-{{ .kubernetes.helm_version }}-linux-amd64.tar.gz
        {{- else -}}

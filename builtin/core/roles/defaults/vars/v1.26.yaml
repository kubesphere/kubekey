kubernetes:
  # helm binary
  helm_version: v3.11.2
  sandbox_image:
    tag: "3.9"
  control_plane_endpoint:
    kube_vip:
      image:
        tag: v0.7.2
    haproxy:
      image:
        tag: 2.9.6-alpine
etcd:
  # etcd binary
  etcd_version: v3.5.10
image_registry:
  # ========== image registry ==========
  # keepalived image tag. Used for load balancing when there are multiple image registry nodes.
  keepalived_version: 2.0.20
  # ========== image registry: harbor ==========
  # Harbor image tag (only valid if type is harbor).
  harbor_version: v2.10.2
  # docker-compose binary
  dockercompose_version: v2.20.3
  # ========== image registry: docker-registry ==========
  # docker-registry image tag
  docker_registry_version: 2.8.3
cri:
  # support: containerd,docker
  container_manager: containerd
  # ========== cri ==========
  # crictl binary
  crictl_version: v1.26.0
  # ========== cri: docker ==========
  # docker binary
  docker_version: 23.0.6
  # cridockerd. Required when kube_version is greater than 1.24
  cridockerd_version: v0.3.7
  # ========== cri: containerd ==========
  # containerd binary
  containerd_version: v1.6.21
  # runc binary
  runc_version: v1.1.7
cni:
  # ========== cni ==========
  # cni_plugins binary (optional)
  # cni_plugins_version: v1.2.0
  # ========== cni: calico ==========
  # calicoctl binary
  calico_version: v3.26.5
  # ========== cni: cilium ==========
  # cilium helm
  cilium_version: 1.15.19
  # ========== cni: flannel ==========
  flannel_version: v0.27.4
  # ========== cni: kubeovn ==========
  # kubeovn helm
  kubeovn_version: v1.13.15
  # ========== cni: hybridnet ==========
  # hybridnet helm
  hybridnet_version: 0.6.8
  # ========== multi-cni: multus ==========
  multus:
    image:
      tag: v4.2.4
  # ========== multi-cni: spiderpool ==========
  spiderpool_version: v1.1.1
storage_class:
  # ========== storageclass ==========
  # ========== storageclass: local ==========
  # openebs/dynamic-localpv-provisioner helm chart version.
  localpv_provisioner_version: 4.4.0
  # ========== storageclass: nfs ==========
  # nfs provisioner helm version
  nfs_provisioner_version: 4.0.18
dns:
  dns_image:
    tag: v1.9.3
  dns_cache_image:
    tag: 1.22.13
---
# Scenario 1: Create cluster or upgrading CRI together.
# Full containerd installation/upgrade including backup, runc, binaries, config, and certs.
- name: Containerd | Full containerd installation or upgrade
  when:
    - or (.kubernetes_install_LoadState.stdout | default "" | ne "loaded") (.upgrade.cri)
  block:
    - name: Containerd | Backup containerd configuration and binaries before upgrade
      when:
        - .kubernetes_install_LoadState.stdout | default "" | eq "loaded"
      command: |
        BACKUP_DIR="/etc/kubekey/backup/containerd/$(date +%Y%m%d-%H%M%S)"
        mkdir -p "${BACKUP_DIR}"
        cp /etc/containerd/config.toml "${BACKUP_DIR}/" 2>/dev/null || true
        cp /usr/local/bin/containerd "${BACKUP_DIR}/" 2>/dev/null || true
        cp /usr/local/bin/ctr "${BACKUP_DIR}/" 2>/dev/null || true
        cp /usr/local/bin/runc "${BACKUP_DIR}/" 2>/dev/null || true
        echo "✅ Containerd backup saved to ${BACKUP_DIR}"

- name: Containerd | Sync Containerd binaries
  block:
    - name: Containerd | Verify if runc is installed on the system
      ignore_errors: true
      command: runc --version
      register: runc_install_version 
    - name: Containerd | Ensure the runc binary is present on the remote node
      when: or (.runc_install_version.error | empty | not) (.runc_install_version.stdout | regexMatch (printf "runc version %s\\s+" (.cri.runc_version | default "" | trimPrefix "v" )) | not)
      copy:
        src: >-
          {{ .binary_dir }}/runc/{{ .cri.runc_version }}/{{ .binary_type }}/runc.{{ .binary_type }}
        dest: /usr/local/bin/runc
        mode: 0755
    - name: Containerd | Check if containerd is installed on the system
      ignore_errors: true
      command: containerd --version
      register: containerd_install_version
    - name: Containerd | Install and configure containerd if not present or version mismatch
      when: or (.containerd_install_version.error | empty | not) (.containerd_install_version.stdout | contains (printf " %s " .cri.containerd_version) | not)
      block:
        - name: Containerd | Copy containerd binary archive to the remote node
          copy:
            src: >-
              {{ .binary_dir }}/containerd/{{ .cri.containerd_version }}/{{ .binary_type }}/containerd-{{ .cri.containerd_version | default "" | trimPrefix "v" }}-linux-{{ .binary_type }}.tar.gz
            dest: >-
              {{ .tmp_dir }}/containerd-{{ .cri.containerd_version | default "" | trimPrefix "v" }}-linux-{{ .binary_type }}.tar.gz
        - name: Containerd | Extract containerd binaries to /usr/local/bin
          command: |
            tar -xvf {{ .tmp_dir }}/containerd-{{ .cri.containerd_version | default "" | trimPrefix "v" }}-linux-{{ .binary_type }}.tar.gz --strip-components=1 -C /usr/local/bin/

- name: Containerd | Synchronize image registry TLS certificates to the remote node
  block:
    - name: Containerd | Copy image registry CA certificate to the remote node
      when: .image_registry.auth.ca_file | fileExists
      copy:
        src: >-
          {{ .image_registry.auth.ca_file }}
        dest: >-
          /etc/containerd/certs.d/{{ .image_registry.auth.registry | splitList "/" | first }}/ca.crt
    - name: Containerd | Copy image registry client certificate to the remote node
      when:
      - .image_registry.auth.cert_file | fileExists
      copy:
        src: >-
          {{ .image_registry.auth.cert_file }}
        dest: >-
          /etc/containerd/certs.d/{{ .image_registry.auth.registry | splitList "/" | first }}/client.crt
    - name: Containerd | Copy image registry client key to the remote node
      when:
      - .image_registry.auth.key_file | fileExists
      copy:
        src: >-
          {{ .image_registry.auth.key_file }}
        dest: >-
          /etc/containerd/certs.d/{{ .image_registry.auth.registry | splitList "/" | first }}/client.key

- name: Containerd | Generate the containerd configuration file
  when: or .upgrade.cri (or (.containerd_install_version.error | empty | not) (.containerd_install_version.stdout | contains (printf " %s " .cri.containerd_version) | not))
  template:
    src: config.toml
    dest: /etc/containerd/config.toml
- name: Containerd | Deploy the containerd systemd service file
  when: or .upgrade.cri (or (.containerd_install_version.error | empty | not) (.containerd_install_version.stdout | contains (printf " %s " .cri.containerd_version) | not))
  copy:
    src: containerd.service
    dest: /etc/systemd/system/containerd.service
- name: Containerd | Start and enable the containerd service
  when: or .upgrade.cri (or (.containerd_install_version.error | empty | not) (.containerd_install_version.stdout | contains (printf " %s " .cri.containerd_version) | not))
  command: |
    systemctl daemon-reload && systemctl restart containerd.service && systemctl enable containerd.service

# Scenario 2: Upgrading Kubernetes but NOT upgrading CRI.
# Containerd is already installed and running, skip all installation steps.
- name: Containerd | Skip containerd operations when not upgrading cri
  when:
    - .kubernetes_install_LoadState.stdout | default "" | eq "loaded"
    - .upgrade.cri | not
  debug:
    msg: >-
      ⏭️ Containerd is not marked for upgrade (upgrade.cri=false). Skipping containerd installation/update. If the installed containerd version is incompatible with Kubernetes {{ .kubernetes.kube_version }}, set --all or --set upgrade.cri=true to upgrade CRI.

{{- $config := .cri.containerd.config }}
{{- $_ := set $config "root" (.cri.containerd.data_root | default "/var/lib/containerd") }}

{{- $mirrors := dict }}
{{- if .cri.registry.mirrors | empty | not }}
{{- $_ := set $mirrors "docker.io" (dict "endpoint" .cri.registry.mirrors) }}
{{- end }}
{{- range .cri.registry.insecure_registries }}
{{- $_ := set $mirrors . (dict "endpoint" (list (printf "http://%s" .))) }}
{{- end }}

{{- $configs := dict }}
{{- if and (.image_registry.auth.registry | empty | not) (ne (.image_registry.auth.registry | splitList "/" | first) "hub.kubesphere.com.cn") }}
  {{- $registry_parts := .image_registry.auth.registry | splitList "/" | first }}
  {{- $skip_tls := true }}
  {{- if hasKey .image_registry.auth "skip_tls_verify" }}
  {{- $skip_tls = .image_registry.auth.skip_tls_verify | toBool }}
  {{- end }}
  {{- $tls := dict "insecure_skip_verify" $skip_tls }}
  {{- if printf "/etc/containerd/certs.d/%s/ca.crt" $registry_parts | fileExists }}
  {{- $_ := set $tls "ca_file" (printf "/etc/containerd/certs.d/%s/ca.crt" $registry_parts) }}
  {{- end }}
  {{- if printf "/etc/containerd/certs.d/%s/client.crt" $registry_parts | fileExists }}
  {{- $_ := set $tls "cert_file" (printf "/etc/containerd/certs.d/%s/client.crt" $registry_parts) }}
  {{- end }}
  {{- if printf "/etc/containerd/certs.d/%s/client.key" $registry_parts | fileExists }}
  {{- $_ := set $tls "key_file" (printf "/etc/containerd/certs.d/%s/client.key" $registry_parts) }}
  {{- end }}
  {{- $auth := dict "username" .image_registry.auth.username "password" .image_registry.auth.password }}
  {{- $_ := set $configs $registry_parts (dict "auth" $auth "tls" $tls) }}
{{- end }}
{{- range .cri.registry.auths | default list }}
  {{- $parts := .registry | splitList "/" | first }}
  {{- $skip_tls := true }}
  {{- if hasKey . "skip_tls_verify" }}
  {{- $skip_tls = .skip_tls_verify | toBool }}
  {{- end }}
  {{- $tls := dict "insecure_skip_verify" $skip_tls }}
  {{- if .ca_file }}
  {{- $_ := set $tls "ca_file" .ca_file }}
  {{- end }}
  {{- if .cert_file }}
  {{- $_ := set $tls "cert_file" .cert_file }}
  {{- end }}
  {{- if .key_file }}
  {{- $_ := set $tls "key_file" .key_file }}
  {{- end }}
  {{- $auth := dict "username" .username "password" .password }}
  {{- $_ := set $configs $parts (dict "auth" $auth "tls" $tls) }}
{{- end }}

{{- if or $mirrors $configs }}
{{- $registry := dict }}
{{- if $mirrors }}{{- $_ := set $registry "mirrors" $mirrors }}{{- end }}
{{- if $configs }}{{- $_ := set $registry "configs" $configs }}{{- end }}
{{- $cri := dict "registry" $registry }}
{{- $plugins := dict "io.containerd.grpc.v1.cri" $cri }}
{{- $config = mergeOverwrite (dict "plugins" $plugins) $config }}
{{- end }}
{{- if and (.cri.containerd.config_policy | eq "merge") (.containerd_config_existing | default dict) }}
  {{- $existing_stdout := .containerd_config_existing.stdout | default "" }}
  {{- $err := .containerd_config_existing.error | default "" }}
  {{- if and ($err | empty) ($existing_stdout | empty | not) }}
    {{- $existing := $existing_stdout | fromTOML }}
    {{- $config = mergeOverwrite $config $existing }}
  {{- end }}
{{- end }}
{{- $options := dig "plugins" "io.containerd.grpc.v1.cri" "containerd" "runtimes" "runc" "options" dict $config }}
{{- if $options }}
{{- if hasKey $options "SystemdCgroup" }}
{{- $_ := set $options "SystemdCgroup" ($options.SystemdCgroup | toBool) }}
{{- end }}
{{- end }}
{{- $config | toToml }}

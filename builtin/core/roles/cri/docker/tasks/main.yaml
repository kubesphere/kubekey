# Scenario 2: Create cluster or upgrading CRI together.
# Perform full Docker installation/upgrade (backup, install, certs).
# cri-dockerd is handled inside the block for K8s >= v1.24.0.
- name: Docker | Full Docker installation or upgrade
  when:
    - or (.kubernetes_install_LoadState.stdout | default "" | ne "loaded") (.upgrade.cri)
  block:
    - name: Docker | Backup Docker configuration and binaries before upgrade
      when:
        - .kubernetes_install_LoadState.stdout | default "" | eq "loaded"
      command: |
        BACKUP_DIR="/etc/kubekey/backup/docker/$(date +%Y%m%d-%H%M%S)"
        mkdir -p "${BACKUP_DIR}"
        cp /etc/docker/daemon.json "${BACKUP_DIR}/" 2>/dev/null || true
        cp /usr/local/bin/docker "${BACKUP_DIR}/" 2>/dev/null || true
        cp /usr/local/bin/dockerd "${BACKUP_DIR}/" 2>/dev/null || true
        cp /usr/local/bin/ctr "${BACKUP_DIR}/" 2>/dev/null || true
        echo "✅ Docker backup saved to ${BACKUP_DIR}"

---
# sync docker binary
- name: Docker | Sync Docker binaries
  block:
    - name: Docker | Check if Docker is installed on the system
      ignore_errors: true
      command: docker --version
      register: docker_install_version
    - name: Docker | Install and configure Docker if not present or version mismatch
      when: or (.docker_install_version.error | empty | not) (.docker_install_version.stdout | hasPrefix (printf "Docker version %s," .cri.docker_version) | not)
      block:
        - name: Docker | Copy Docker binary archive to the remote node
          copy:
            src: >-
              {{ .binary_dir }}/docker/{{ .cri.docker_version }}/{{ .binary_type }}/docker-{{ .cri.docker_version }}.tgz
            dest: >-
              {{ .tmp_dir }}/docker-{{ .cri.docker_version }}.tgz
        - name: Docker | Extract Docker binaries to /usr/local/bin
          command: |
            tar -C /usr/local/bin/ --strip-components=1 -xvf {{ .tmp_dir }}/docker-{{ .cri.docker_version }}.tgz --wildcards 'docker/*'

# sync image registry certificates
- name: Docker | Synchronize image registry TLS certificates to the remote node
  block:
    - name: Docker | Copy image registry CA certificate to the remote node
      when: .image_registry.auth.ca_file | fileExists
      copy:
        src: >-
          {{ .image_registry.auth.ca_file }}
        dest: >-
          /etc/docker/certs.d/{{ .image_registry.auth.registry | splitList "/" | first }}/ca.crt
    - name: Docker | Copy image registry server certificate to the remote node
      when:
      - .image_registry.auth.cert_file | fileExists
      copy:
        src: >-
          {{ .image_registry.auth.cert_file }}
        dest: >-
          /etc/docker/certs.d/{{ .image_registry.auth.registry | splitList "/" | first }}/client.cert
    - name: Docker | Copy image registry server key to the remote node
      when:
      - .image_registry.auth.key_file | fileExists
      copy:
        src: >-
          {{ .image_registry.auth.key_file }}
        dest: >-
          /etc/docker/certs.d/{{ .image_registry.auth.registry | splitList "/" | first }}/client.key
    - name: Docker | Copy image registry CA certificate to the remote node
      when: .image_registry.auth.ca_file | fileExists
      copy:
        src: >-
          {{ .image_registry.auth.ca_file }}
        dest: >-
          /etc/containerd/certs.d/{{ .image_registry.auth.registry | splitList "/" | first }}/ca.crt
    - name: Docker | Copy image registry client certificate to the remote node
      when:
      - .image_registry.auth.cert_file | fileExists
      copy:
        src: >-
          {{ .image_registry.auth.cert_file }}
        dest: >-
          /etc/containerd/certs.d/{{ .image_registry.auth.registry | splitList "/" | first }}/client.crt
    - name: Docker | Copy image registry client key to the remote node
      when:
      - .image_registry.auth.key_file | fileExists
      copy:
        src: >-
          {{ .image_registry.auth.key_file }}
        dest: >-
          /etc/containerd/certs.d/{{ .image_registry.auth.registry | splitList "/" | first }}/client.key

# install or update docker service
- name: Docker | Configure Docker daemon
  when: or .upgrade.cri (or (.docker_install_version.error | empty | not) (.docker_install_version.stdout | hasPrefix (printf "Docker version %s," .cri.docker_version) | not))
  block:
    - name: Docker | Read existing Docker daemon configuration
      when: .cri.docker.daemon_policy | eq "merge"
      ignore_errors: true
      command: cat /etc/docker/daemon.json
      register: docker_daemon_existing
      register_type: json
    - name: Docker | Generate Docker configuration file
      template:
        src: daemon.json
        dest: /etc/docker/daemon.json
- name: Docker | Deploy the Docker systemd service file
  when: or .upgrade.cri (or (.docker_install_version.error | empty | not) (.docker_install_version.stdout | hasPrefix (printf "Docker version %s," .cri.docker_version) | not))
  copy:
    src: docker.service
    dest: /etc/systemd/system/docker.service
- name: Containerd | Configure containerd
  when: or .upgrade.cri (or (.docker_install_version.error | empty | not) (.docker_install_version.stdout | hasPrefix (printf "Docker version %s," .cri.docker_version) | not))
  block:
    - name: Containerd | Read existing containerd configuration
      when: .cri.containerd.config_policy | eq "merge"
      ignore_errors: true
      command: cat /etc/containerd/config.toml
      register: containerd_config_existing
    - name: Containerd | Generate the containerd configuration file
      template:
        src: config.toml
        dest: /etc/containerd/config.toml
- name: Docker | Deploy the containerd systemd service file
  when: or .upgrade.cri (or (.docker_install_version.error | empty | not) (.docker_install_version.stdout | hasPrefix (printf "Docker version %s," .cri.docker_version) | not))
  copy:
    src: containerd.service
    dest: /etc/systemd/system/containerd.service
- name: Docker | Start and enable Docker and containerd services
  when: or .upgrade.cri (or (.docker_install_version.error | empty | not) (.docker_install_version.stdout | hasPrefix (printf "Docker version %s," .cri.docker_version) | not))
  command: |
    systemctl daemon-reload && systemctl restart containerd.service && systemctl enable containerd.service
    systemctl daemon-reload && systemctl restart docker.service && systemctl enable docker.service

# Docker | Install cri-dockerd if required for Kubernetes >= v1.24.0
- include_tasks: cridockerd.yaml
  when:
    - .cri.container_manager | eq "docker"
    - .kubernetes.kube_version | semverCompare ">=v1.24.0"
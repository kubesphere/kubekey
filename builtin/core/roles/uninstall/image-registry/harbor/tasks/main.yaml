- name: Harbor | Gracefully stop and disable the Harbor service
  ignore_errors: true
  command: |
    systemctl stop harbor.service
    systemctl disable harbor.service
    rm -rf /etc/systemd/system/harbor.service*
    systemctl daemon-reload
    systemctl reset-failed harbor.service

- name: Harbor | Remove all residual Harbor files and directories
  command: |
    rm -rf /opt/harbor/

- name: Harbor | Remove Harbor data directory
  when: .delete.data | default false
  command: |
    rm -rf {{ .image_registry.harbor.data_dir | default "/var/lib/harbor/data" }}
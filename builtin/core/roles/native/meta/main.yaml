dependencies:
  # Configure multipath blacklist before disk formatting when enabled.
  - role: native/multipath
    when: .kubernetes.multipath.enabled | default false
  # Format disks configured in inventory host vars before other initialization steps.
  - role: native/storage
    when: or (.storage | empty | not) (.kubernetes.storage_disks | empty | not)
  # Initialize new Kubernetes nodes
  - role: native/repository
    when:
      - or (.groups.k8s_cluster | default list | has .inventory_hostname) (.groups.image_registry | default list | has .inventory_hostname)
  # install nfs for nfs nodes
  - role: native/nfs
    when: .groups.nfs | default list | has .inventory_hostname
  # Always perform initialization steps for all nodes
  - role: native/ntp
    when:
      - or (.groups.k8s_cluster | default list | has .inventory_hostname) (.groups.image_registry | default list | has .inventory_hostname)
  - role: native/init
  - role: native/dns


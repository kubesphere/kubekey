---
- name: Storage | Generate inventory disk formatting script
  when: .storage | empty | not
  template:
    src: format-storage-inventory.sh
    dest: /etc/kubekey/scripts/format-storage-inventory.sh
    mode: 0755

- name: Storage | Execute inventory disk formatting script
  when: .storage | empty | not
  command: /etc/kubekey/scripts/format-storage-inventory.sh

- name: Storage | Generate web installer disk formatting script
  when: .kubernetes.storage_disks | empty | not
  template:
    src: format-storage-web.sh
    dest: /etc/kubekey/scripts/format-storage-web.sh
    mode: 0755

- name: Storage | Execute web installer disk formatting script
  when: .kubernetes.storage_disks | empty | not
  command: /etc/kubekey/scripts/format-storage-web.sh

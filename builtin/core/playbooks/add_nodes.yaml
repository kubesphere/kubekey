---
- hosts:
    - all
  gather_facts: true
  roles:
    - native/root
- import_playbook: hook/pre_install.yaml

# Load default variables and perform prechecks on all hosts
- hosts:
    - all
  gather_facts: true
  roles:
    - defaults
    - precheck

# Download all required software and generate certificates on the localhost
- hosts:
    - localhost
  gather_facts: true
  roles:
    - certs/init
    - download

# Initialize all nodes and install necessary software packages
- hosts:
    - etcd
    - k8s_cluster
    - image_registry
    - nfs
  roles:
    - native

# Install the etcd cluster
- hosts:
    - etcd
  gather_facts: true
  roles:
    - role: etcd/prepare
      when: .etcd.deployment_type | eq "external"
    - role: etcd/backup
      when: .etcd.deployment_type | eq "external"
- hosts:
    - etcd
  serial: 1
  roles:
    - role: etcd/scaling_up/learner
      when:
        - .etcd.deployment_type | eq "external"  
        - .installed_etcd | empty | not      
        - .need_installed_etcd | default list | has .inventory_hostname
    - role: etcd/install
      when: 
        - .etcd.deployment_type | eq "external"
        - .installed_etcd | empty | not      
        - .need_installed_etcd | default list | has .inventory_hostname
    - role: etcd/scaling_up/promote
      when:
        - .etcd.deployment_type | eq "external"
        - .installed_etcd | empty | not      
        - .need_installed_etcd | default list | has .inventory_hostname
- hosts:
    - etcd
  gather_facts: true
  roles:
    - role: etcd/postprocess
      when:
        - .etcd.deployment_type | eq "external"
        - .installed_etcd | empty | not      
        - .need_installed_etcd | default list | has .inventory_hostname
        
- hosts:
    - kube_control_plane
  serial: 1
  roles:
    - role: kubernetes/sync-etcd-config
      when:
        - .need_installed_etcd | empty | not
        - .etcd.deployment_type | eq "external"
        - .kubernetes_install_ActiveState.stdout | eq "active"

- hosts:
    - k8s_cluster
  roles:
    - role: cri
      when: or (.add_nodes | default list | empty) (.add_nodes | default list | has .inventory_hostname)
    - role: kubernetes/pre-kubernetes
      when: or (.add_nodes | default list | empty) (.add_nodes | default list | has .inventory_hostname)
    - role: kubernetes/init-kubernetes
    - role: kubernetes/join-kubernetes
      when:
        - or (.add_nodes | default list | empty) (.add_nodes | default list | has .inventory_hostname)
        - .kubernetes_install_LoadState.stdout | eq "not-found"
    - role: kubernetes/certs
      when: 
        - or (.add_nodes | default list | empty) (.add_nodes | default list | has .inventory_hostname)
        - .groups.kube_control_plane | default list | has .inventory_hostname
        - .kubernetes.certs.renew
  post_tasks:
    - name: Add custom labels to the cluster nodes
      delegate_to: "{{ .init_kubernetes_node }}"
      when: .kubernetes.custom_labels | empty | not
      command: >-
        /usr/local/bin/kubectl label --overwrite node {{ $.hostname }}
        {{- range $k, $v := .kubernetes.custom_labels }} {{ $k }}={{ $v }}{{- end }}
    - name: Add custom taint to the cluster nodes
      delegate_to: "{{ .init_kubernetes_node }}"
      when: .kubernetes.custom_taints | default list | empty | not
      command: >-
        /usr/local/bin/kubectl taint --overwrite nodes {{ $.hostname }}
        {{- range .kubernetes.custom_taints }} {{ . }}{{- end }}

- import_playbook: hook/post_install.yaml
